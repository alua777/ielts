services:
  postgres:
    image: postgres:16-alpine
    container_name: ielts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ielts
      POSTGRES_PASSWORD: ielts
      POSTGRES_DB: ielts
    ports:
      - "5433:5432"
    volumes:
      - ielts_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ielts -d ielts"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ielts_postgres_data:
